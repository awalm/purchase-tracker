services:
  postgres:
    image: postgres:15-alpine
    container_name: bg-tracker-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: bg_tracker
      POSTGRES_USER: bg_tracker
      POSTGRES_PASSWORD: bg_tracker_dev
    ports:
      - "${PG_PORT:-5432}:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bg_tracker -d bg_tracker"]
      interval: 5s
      timeout: 5s
      retries: 5
